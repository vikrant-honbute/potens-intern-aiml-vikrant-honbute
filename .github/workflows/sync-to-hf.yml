name: Sync to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          set -euo pipefail
          HF_USERNAME="${HF_USERNAME:-user}"
          
          # Remove the System_Architecture directory completely from the local filesystem
          rm -rf System_Architecture
          
          # Re-initialize git to clear all history, preventing binary file rejection from past commits
          rm -rf .git
          git init -b main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add .
          git commit -m "Deploy to Hugging Face"
          
          git remote add hf https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/Vikrant-Honbute/schemesense-ai
          # Push the single clean commit to the main branch on HF
          git push hf main --force
