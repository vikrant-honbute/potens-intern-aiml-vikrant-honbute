name: Sync to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          SPACE_REPO_URL="${HF_SPACE_REPO:-https://huggingface.co/spaces/Vikrant-Honbute/schemesense-ai}"
          WORKDIR="/tmp/hf-space-sync"

          git clone "https://user:${HF_TOKEN}@${SPACE_REPO_URL#https://}" "${WORKDIR}"
          rsync -a --delete --exclude '.git' ./ "${WORKDIR}/"

          cd "${WORKDIR}"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi

          git add -A
          git commit -m "sync: update space from github"
          git push origin main
